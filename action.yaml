name: Setup Bastion SSH
description: Configure SSH access to private servers through a bastion/jump host

branding:
  icon: terminal
  color: gray-dark

inputs:
  ssh-private-key:
    required: true

  bastion-host:
    required: true

  bastion-user:
    required: true

  bastion-port:
    required: false
    default: "22"

  bastion-known-host:
    required: false

  server-host:
    required: true

  server-user:
    required: true

  server-port:
    required: false
    default: "22"

  server-known-host:
    required: false

  strict-host-checking:
    required: false
    default: "no"

runs:
  using: composite

  steps:
    - name: Configure SSH
      shell: bash
      run: |
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh

        echo "${{ inputs.ssh-private-key }}" > ~/.ssh/ssh-key
        chmod 600 ~/.ssh/ssh-key

        # Validate secure mode requirements
        if [ "${{ inputs.strict-host-checking }}" = "yes" ]; then
          if [ -z "${{ inputs.bastion-known-host }}" ]; then
            echo "ERROR: bastion-known-host is required when strict-host-checking=yes"
            exit 1
          fi

          if [ -z "${{ inputs.server-known-host }}" ]; then
            echo "ERROR: server-known-host is required when strict-host-checking=yes"
            exit 1
          fi

          touch ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

          echo "${{ inputs.bastion-known-host }}" >> ~/.ssh/known_hosts
          echo "${{ inputs.server-known-host }}" >> ~/.ssh/known_hosts
        fi

        cat > ~/.ssh/config <<EOF
        Host bastion
          HostName ${{ inputs.bastion-host }}
          User ${{ inputs.bastion-user }}
          Port ${{ inputs.bastion-port }}
          IdentityFile ~/.ssh/ssh-key
          IdentitiesOnly yes
          StrictHostKeyChecking ${{ inputs.strict-host-checking }}

        Host target
          HostName ${{ inputs.server-host }}
          User ${{ inputs.server-user }}
          Port ${{ inputs.server-port }}
          ProxyJump bastion
          IdentityFile ~/.ssh/ssh-key
          IdentitiesOnly yes
          StrictHostKeyChecking ${{ inputs.strict-host-checking }}
        EOF

        chmod 600 ~/.ssh/config
